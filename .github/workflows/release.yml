name: 'publish'

on:
  pull_request:
    branches: '**'
  push:
    branches:
      - main
      - release
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal macOS build
          - platform: 'macos-15'
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}
    
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
      CMAKE_OSX_DEPLOYMENT_TARGET: "11.0"
      CFLAGS: "-U__ARM_FEATURE_MATMUL_INT8"
      CXXFLAGS: "-U__ARM_FEATURE_MATMUL_INT8"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: install frontend dependencies
        run: bun install

      - name: build frontend
        run: bun run build

      - name: extract release notes
        id: release_notes
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import sys
          
          version = json.load(open("src-tauri/tauri.conf.json", "r", encoding="utf-8"))["version"]
          text = open("changelog.md", "r", encoding="utf-8").read()
          
          pattern = rf"(?ms)^{re.escape(version)}\\s*(.*?)^\\s*---\\s*$"
          match = re.search(pattern, text)
          if not match:
            print(f"ERROR: version {version} not found in changelog.md", file=sys.stderr)
            sys.exit(1)
          
          body = match.group(1).strip()
          if not body:
            print(f"ERROR: no release notes found for version {version} in changelog.md", file=sys.stderr)
            sys.exit(1)
          
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"version={version}\n")
            f.write("body<<'EOF'\n")
            f.write(body + "\n")
            f.write("EOF\n")
          PY

      - name: import Apple Developer Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: verify certificate
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "CERT_ID=$CERT_ID" >> $GITHUB_ENV
          echo "Certificate imported."

      - name: build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}
          VITE_APPWRITE_PROJECT_ID: ${{ secrets.VITE_APPWRITE_PROJECT_ID }}
          VITE_APPWRITE_PROJECT_NAME: ${{ secrets.VITE_APPWRITE_PROJECT_NAME }}
          VITE_APPWRITE_ENDPOINT: ${{ secrets.VITE_APPWRITE_ENDPOINT }}
          VITE_APPWRITE_DATABASE_ID: ${{ secrets.VITE_APPWRITE_DATABASE_ID }}
          VITE_APPWRITE_TRANSCRIPTIONS_COLLECTION_ID: ${{ secrets.VITE_APPWRITE_TRANSCRIPTIONS_COLLECTION_ID }}
          APTABASE_KEY: ${{ secrets.APTABASE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: 'Glimpse v__VERSION__'
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
