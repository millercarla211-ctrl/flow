name: "ci"

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-pr-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  run-ci:
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/run-ci') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: macos-15

    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      CMAKE_OSX_DEPLOYMENT_TARGET: "14.0"

    steps:
      - name: resolve PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number,
            });
            core.setOutput("head_repo", pr.data.head.repo.full_name);
            core.setOutput("head_sha", pr.data.head.sha);
            core.setOutput("base_repo", pr.data.base.repo.full_name);

            if (pr.data.head.repo.full_name !== pr.data.base.repo.full_name) {
              core.setFailed("Refusing to run /run-ci for forked PRs.");
            }

      - name: checkout PR
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: cache bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/bun
            ~/Library/Caches/bun
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cache rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: install frontend dependencies
        run: bun install --frozen-lockfile

      - name: build frontend
        run: bun run build

      - name: cargo check
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml
